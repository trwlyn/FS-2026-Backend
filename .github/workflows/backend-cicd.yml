name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main  # Pastikan branch utama Anda bernama 'main'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-node@v4 # Kita gunakan node sebentar untuk install flake8 via pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        # Menjalankan static code analysis (syarat proyek)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  delivery:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Login ke Docker Hub
      - name: Login Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 2. Build & Push Image Backend
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Gunakan nama image yang berbeda dari frontend agar tidak tertimpa
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/the-reading-nook-backend:latest

      # 3. Trigger Render untuk Deploy Ulang (Deploy Hook)
      - name: Deploy to Render
        run: |
          curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK }}