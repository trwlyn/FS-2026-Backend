name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Step 1: TESTING
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8 Linting
        # Check python syntax
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Step 2: BUILD (Dockerizing)
  build:
    runs-on: ubuntu-latest
    needs: test # Only run when test succeed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/the-reading-nook-backend:latest

  # Step 3: DEPLOY (Update Server)
  deploy:
    runs-on: ubuntu-latest
    needs: build # Only run when build succeed
    steps:
      - name: Trigger Render Deployment
        # Send new signal to get new image from Docker Hub
        run: |
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"